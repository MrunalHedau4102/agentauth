name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run tests
      run: pytest tests/ -v
    
    - name: Check versions match
      run: |
        python3 << 'EOF'
        import re
        
        with open('agentauth/__init__.py') as f:
            init_content = f.read()
            init_match = re.search(r'__version__\s*=\s*["\']([^"\']*)["\']', init_content)
            init_version = init_match.group(1) if init_match else None
        
        with open('pyproject.toml') as f:
            pyproject_content = f.read()
            pyproject_match = re.search(r'version\s*=\s*["\']([^"\']*)["\']', pyproject_content)
            pyproject_version = pyproject_match.group(1) if pyproject_match else None
        
        print(f"__init__.py: {init_version}")
        print(f"pyproject.toml: {pyproject_version}")
        
        if init_version != pyproject_version:
            print("ERROR: Versions don't match!")
            exit(1)
        else:
            print(f"✓ Versions match: {init_version}")
        EOF

  build-and-publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine wheel
    
    - name: Build distributions
      run: |
        python -m build
    
    - name: Check package integrity
      run: |
        twine check dist/*
    
    - name: Publish to PyPI (production)
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
      if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    
    - name: Create GitHub Release Assets
      if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

